aid: django
name: Django
description: >-
  A high-level Python web framework that encourages rapid development and
  clean, pragmatic design. Django follows the model-template-views architectural
  pattern and includes an ORM, automatic admin interface, robust template
  system, and quick internationalization support. The current release line
  is Django 6.0, supported by the non-profit Django Software Foundation, and
  it powers some of the busiest websites globally.
